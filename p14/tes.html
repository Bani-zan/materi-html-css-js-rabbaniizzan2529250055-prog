<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Berita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="p-5 mb-4 bg-primary text-white rounded-3">
  <div class="container">
    <h1 class="display-5">Portal Berita</h1>
    <p class="lead">Menampilkan berita terbaru</p>
  </div>
</div>

<!-- Content -->
<div class="container">
  <h2 class="mb-4">Berita Terbaru</h2>
  <div class="row" id="berita-container">
    <!-- Loading placeholder -->
    <div class="col-12">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3">Memuat berita...</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Delay 5 detik seperti yang Anda inginkan
  setTimeout(() => {
    // Opsi 1: Data langsung (tidak perlu file JSON)
    const beritaData = [
      {
        "gambar": "https://via.placeholder.com/400x250?text=Berita+1",
        "judul": "Berita 1",
        "deskripsi": "Ini adalah deskripsi berita pertama."
      },
      {
        "gambar": "https://via.placeholder.com/400x250?text=Berita+2",
        "judul": "Berita 2", 
        "deskripsi": "Ini adalah deskripsi berita kedua."
      },
      {
        "gambar": "https://via.placeholder.com/400x250?text=Berita+3",
        "judul": "Berita 3",
        "deskripsi": "Ini adalah deskripsi berita ketiga."
      }
    ];

    tampilkanBerita(beritaData);

    // Opsi 2: Fetch dari file JSON (buat file berita.json terpisah)
    /*
    fetch('berita.json')
      .then(response => response.json())
      .then(data => tampilkanBerita(data))
      .catch(error => {
        console.error('Error:', error);
        // Fallback ke data lokal jika fetch gagal
        tampilkanBerita(beritaData);
      });
    */
  }, 5000);
});

function tampilkanBerita(data) {
  let container = document.getElementById('berita-container');
  
  // Hapus loading
  container.innerHTML = '';

  data.forEach(item => {
    let col = document.createElement('div');
    col.className = 'col-md-4 mb-4';

    col.innerHTML = `
      <div class="card h-100 shadow-sm">
        <img src="${item.gambar}" class="card-img-top" alt="${item.judul}" 
             style="height: 200px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">${item.judul}</h5>
          <p class="card-text flex-grow-1">${item.deskripsi}</p>
          <a href="#" class="btn btn-primary mt-auto">Baca Selengkapnya</a>
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}
</script>

</body>
</html>
