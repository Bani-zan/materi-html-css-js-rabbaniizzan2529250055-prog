<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gempa Dashboard </title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(135deg,#05daff,#243b55);
  color:rgb(42, 46, 46);
  font-family: 'Segoe UI', sans-serif;
  transition: 0.3s;
}

body.light {
  background:#f4f6f9;
  color:black;
}

/* NAVBAR */
.navbar {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
}

/* MAP */
#map {
  height:420px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  margin-bottom:20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  border-radius:20px;
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* STAT */
.stat-card {
  text-align:center;
  padding:15px;
}

.stat-value {
  font-size:24px;
  font-weight:bold;
}

/* BIG GEMPA */
.big {
  color:#1bb2b8;
  font-weight:bold;
}

/* INPUT */
input {
  border-radius:10px;
  border:none;
  padding:5px 10px;
}

/* BUTTON */
.btn-warning {
  border-radius:10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3 mb-3">
  <div class="container-fluid">
    <span class="navbar-brand text-white">🌍 Gempa Dashboard</span>
    <span>Realtime Monitoring System</span>
  </div>
</nav>

<div class="container py-3">

<h2 class="text-center mb-3">Gempa Indonesia</h2>

<!-- STAT -->
<div class="row mb-3">
  <div class="col-md-4">
    <div class="card stat-card">
      <div>Total Gempa</div>
      <div class="stat-value" id="totalGempa">0</div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card stat-card">
      <div>Rata-rata Magnitudo</div>
      <div class="stat-value" id="avgMag">0</div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card stat-card">
      <div>Gempa ≥ 5 SR</div>
      <div class="stat-value" id="bigGempa">0</div>
    </div>
  </div>
</div>

<!-- CONTROL -->
<div class="d-flex justify-content-between mb-2">
  <input type="number" id="minMag" value="0" step="0.1">
  <button class="btn btn-warning" onclick="toggleMode()">🌗 Mode</button>
</div>

<!-- MAP -->
<div id="map"></div>

<div class="row">
  <div class="col-md-6">
    <div class="card p-3">
      <h5>Gempa Terbaru</h5>
      <div id="api1"></div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3">
      <h5>Data Gempa</h5>
      <div id="api2"></div>
    </div>
  </div>
</div>

<!-- CHART -->
<div class="card p-3 mt-3">
  <h5>Grafik Magnitude</h5>
  <canvas id="chart"></canvas>
</div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map = L.map('map').setView([-2.5,118],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let cluster = L.markerClusterGroup();
map.addLayer(cluster);

let chart;

/* MODE */
function toggleMode(){
 document.body.classList.toggle('light');
}

/* WARNA */
function getColor(m){
 if(m>=6) return 'red';
 if(m>=5) return 'orange';
 if(m>=4) return 'yellow';
 return 'green';
}

/* LOAD DATA */
function load(){
 cluster.clearLayers();

 let minMag = document.getElementById("minMag").value;
 let mags=[];

 /* API 1 */
 fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json')
 .then(r=>r.json())
 .then(d=>{
   let g=d.Infogempa.gempa;
   let mag=parseFloat(g.Magnitude);

   document.getElementById('api1').innerHTML =
     `<div class="${mag>=5?'big':''}">
      📍 ${g.Wilayah}<br>
      📊 Mag: ${g.Magnitude}<br>
      ⏰ ${g.Tanggal} ${g.Jam}
     </div>`;
 });

 /* API 2 */
 fetch('https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json')
 .then(r=>r.json())
 .then(d=>{
   let html="";
   let total=0,sum=0,big=0;

   d.Infogempa.gempa.slice(0,15).forEach(g=>{
     let mag=parseFloat(g.Magnitude);
     if(mag<minMag) return;

     total++;
     sum+=mag;
     if(mag>=5) big++;

     mags.push(mag);

     let coord=g.Coordinates.split(",");
     let lat=parseFloat(coord[0]);
     let lon=parseFloat(coord[1]);

     let m=L.circleMarker([lat,lon],{
       radius:8,
       color:getColor(mag)
     }).bindPopup(`${g.Wilayah}<br>Mag ${g.Magnitude}`);

     cluster.addLayer(m);

     html+=`<div class="${mag>=5?'big':''}">
       📍 ${g.Wilayah} - ${g.Magnitude}
     </div>`;
   });

   document.getElementById('api2').innerHTML=html;

   document.getElementById("totalGempa").innerText=total;
   document.getElementById("avgMag").innerText=(sum/total).toFixed(2);
   document.getElementById("bigGempa").innerText=big;

   drawChart(mags);
 });
}

/* CHART */
function drawChart(data){
 let ctx=document.getElementById('chart');
 if(chart) chart.destroy();

 chart=new Chart(ctx,{
   type:'bar',
   data:{
     labels:data.map((_,i)=>"G"+(i+1)),
     datasets:[{label:"Magnitude",data:data}]
   }
 });
}

/* AUTO REFRESH */
setInterval(load,30000);

/* FILTER */
document.getElementById("minMag").addEventListener("input",load);

/* INIT */
load();

</script>

</body>
</html>
